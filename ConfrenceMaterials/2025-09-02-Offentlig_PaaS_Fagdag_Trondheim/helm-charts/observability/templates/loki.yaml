apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.loki.name }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  ignoreDifferences:
    {{- /* Make sure default autoscaling doesn't mess with replica count set by KEDA. */}}
    - group: apps
      kind: Deployment
      name: {{ .Values.loki.name }}-querier
      jsonPointers:
        - /spec/replicas
  project: {{ .Values.argocdProject }}
  source:
    repoURL: https://grafana-community.github.io/helm-charts
    targetRevision: 13.6.1
    chart: loki
    {{- /* This doesn't work yet with ArgoCd and Harbor (or mostly anything except dockerhub
    repoURL: oci://{{ .Values.registryGhcr }}/grafana-community/helm-charts/loki
    targetRevision: 13.6.1
    # This path is not used but must be set when using an oci-repo
    path: "."
    */}}
    helm:
      valuesObject:
        global:
          {{- /* Cannot use this, because we've got images from both dockerhub and ghcr now
          imageRegistry: {{ .Values.registry }}
          */}}
          {{- /* Somebody vibed too hard, it gets passed to canary, so it is not actually scoped to scope: backend, bloom-builder, bloom-gateway, bloom-planner, compactor, distributor, index-gateway, ingester, overrides-exporter, pattern-ingester, querier, query-frontend, query-scheduler, read, ruler, write
          extraArgs:
            - -config.expand-env=true
          */}}
          extraEnv:
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          {{- if .Values.enableTracing }}
            - name: JAEGER_AGENT_HOST
              value: "{{ .Values.internalCollectorDomainName }}"
            - name: JAEGER_SAMPLER_TYPE
              value: "const"
            - name: JAEGER_SAMPLER_PARAM
              value: "1"
          {{- end }}
          extraEnvFrom:
            - secretRef:
                name: {{ .Values.loki.name }}
        defaults:
          {{- /* Cant have this here either, for same reason as not in the "global" section
          extraArgs:
            - -config.expand-env=true
          */}}
          statefulSetRecreateJob:
            image:
              registry: {{ .Values.registryK8sio }}
        fullnameOverride: {{ .Values.loki.name }}
        deploymentMode: Distributed
        loki:
          image:
            registry: {{ .Values.registry }}
          revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
          podSecurityContext:
            fsGroup: 10001
            runAsGroup: 10001
            runAsNonRoot: true
            runAsUser: 10001
            supplementalGroups:
              - 100
          containerSecurityContext:
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          extraMemberlistConfig:
            cluster_label: {{ print .Values.loki.name "." .Values.loki.namespace | quote }}
            bind_addr:
              - ${MY_POD_IP}
          server:
            log_level: {{ .Values.logLevel }}
            log_format: {{ .Values.logFormat }}
          limits_config:
            allow_structured_metadata: true
            # This is 8 times larger than default. Increased since teams were hitting rate limit with default value.
            ingestion_rate_mb: 32
            # This is more than 8 times larger than default. Increased since teams were hitting rate limit with default value.
            ingestion_burst_size_mb: 48
            retention_period: {{ .Values.loki.retention }}
            max_query_length: {{ .Values.loki.retention }}
            # This is 32 times larger than default. Increased due to teams hitting limit.
            max_structured_metadata_size: 2MB
          storage:
            type: s3
            s3:
              endpoint: {{ .Values.s3Endpoint }}
              accessKeyId: ${S3_USER}
              secretAccessKey: ${S3_PASSWORD}
              s3ForcePathStyle: true
              http_config:
                insecure_skip_verify: true
            bucketNames:
              chunks: {{ .Values.bucketPrefix }}{{ .Values.loki.name }}-chunks
              ruler: {{ .Values.bucketPrefix }}{{ .Values.loki.name }}-ruler
          schemaConfig:
            configs:
              - from: 2024-04-01
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
          compactor:
            retention_enabled: true
            delete_request_store: s3
          analytics:
            reporting_enabled: false
          querier:
            multi_tenant_queries_enabled: true
          ingester:
            chunk_encoding: snappy
          {{- if .Values.enableTracing }}
          tracing:
            enabled: true
          {{- end }}
        test:
          enabled: true
          image:
            registry: {{ .Values.registry }}
        lokiCanary:
          enabled: true
          image:
            registry: {{ .Values.registry }}
          extraArgs: []
          resources:
            {{- toYaml .Values.loki.canary.resources | nindent 12 }}
        gateway:
          enabled: {{ .Values.loki.useGateway }}
          image:
            registry: {{ .Values.registry }}
          metrics:
            image:
              registry: {{ .Values.registryGhcr }}
            extraArgs: []
          autoscaling:
            enabled: {{ .Values.loki.useGateway }}
            minReplicas: 2
            maxReplicas: 9
            targetMemoryUtilizationPercentage: 75
          podSecurityContext:
            fsGroup: 101
            runAsGroup: 101
            runAsNonRoot: true
            runAsUser: 101
            supplementalGroups:
              - 100
          containerSecurityContext:
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          resources:
            {{- toYaml .Values.loki.gateway.resources | nindent 12 }}
        singleBinary:
          replicas: 0
        write:
          replicas: 0
        read:
          replicas: 0
        backend:
          replicas: 0
        ingester:
          replicas: {{ .Values.loki.ingester.replicas }}
          resources:
            {{- toYaml .Values.loki.ingester.resources | nindent 12 }}
          extraArgs:
            - -config.expand-env=true
          updateStrategy:
            type: OnDelete
          persistence:
            enabled: true
            claims:
              - name: data
                accessModes:
                  - ReadWriteOnce
                size: 10Gi
                {{- with .Values.storageClass }}
                storageClass: {{ . }}
                {{- end }}
          rolloutGroupPrefix: loki
          addIngesterNamePrefix: loki
        distributor:
          replicas: {{ .Values.loki.distributor.replicas }}
          maxUnavailable: 2
          resources:
            {{- toYaml .Values.loki.distributor.resources | nindent 12 }}
          extraArgs:
            - -config.expand-env=true
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/component: loki-distributor
                  topologyKey: kubernetes.io/hostname
        querier:
          resources:
            {{- toYaml .Values.loki.querier.resources | nindent 12 }}
          extraArgs:
            - -config.expand-env=true
          affinity:
            podAntiAffinity:
              {{- /* This must be set to an empty slice to override the affinity set in the upstream chart */}}
              requiredDuringSchedulingIgnoredDuringExecution: []
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchExpressions:
                        - key: app.kubernetes.io/component
                          operator: In
                          values:
                            - querier
                        - key: app.kubernetes.io/instance
                          operator: In
                          values:
                            - loki
                    topologyKey: kubernetes.io/hostname
          maxUnavailable: 2
        queryFrontend:
          replicas: {{ .Values.loki.queryFrontend.replicas }}
          maxUnavailable: 1
          resources:
            {{- toYaml .Values.loki.queryFrontend.resources | nindent 12 }}
          extraArgs:
            - -config.expand-env=true
        queryScheduler:
          replicas: {{ .Values.loki.queryScheduler.replicas }}
          resources:
            {{- toYaml .Values.loki.queryScheduler.resources | nindent 12 }}
          extraArgs:
            - -config.expand-env=true
        indexGateway:
          replicas: {{ .Values.loki.indexGateway.replicas }}
          maxUnavailable: 1
          resources:
            {{- toYaml .Values.loki.indexGateway.resources | nindent 12 }}
          extraArgs:
            - -config.expand-env=true
          persistence:
            enabled: true
            size: 1Gi
            {{- with .Values.storageClass }}
            storageClass: {{ . }}
            {{- end }}
        compactor:
          replicas: 1
          resources:
            {{- toYaml .Values.loki.compactor.resources | nindent 12 }}
          extraArgs:
            - -config.expand-env=true
          persistence:
            enabled: true
            claims:
              - name: data
                accessModes:
                  - ReadWriteOnce
                size: 1Gi
                {{- with .Values.storageClass }}
                storageClass: {{ . }}
                {{- end }}
        bloomGateway:
          replicas: 0
        bloomPlanner:
          replicas: 0
        bloomBuilder:
          replicas: 0
        bloomCompactor:
          replicas: 0
        ruler:
          replicas: 1
          resources:
            {{- toYaml .Values.loki.ruler.resources | nindent 12 }}
          extraArgs:
            - -config.expand-env=true
          persistence:
            enabled: true
            size: 1Gi
            {{- with .Values.storageClass }}
            storageClass: {{ . }}
            {{- end }}
        memcached:
          {{- /* # ToDo: Override image repository, is "memcached", we should set it to "{{ .Values.registry }}/memcached" ?
          image:
            repository: {{ .Values.registry }}/memcached
          */}}
          podSecurityContext:
            seccompProfile:
              type: RuntimeDefault
            supplementalGroups:
              - 100
          containerSecurityContext:
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
            privileged: false
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 11211
            runAsGroup: 11211
            readOnlyRootFilesystem: true
        memcachedExporter:
          {{- /* # ToDo: Override image repository, is "prom/memcached-exporter", we should set it to "{{ .Values.registry }}/prom/memcached-exporter" ?
          image:
            repository: {{ .Values.registry }}/prom/memcached-exporter
          */}}
          resources:
            {{- toYaml .Values.loki.memcachedExporter.resources | nindent 12 }}
          containerSecurityContext:
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
            privileged: false
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            readOnlyRootFilesystem: true
        resultsCache:
          replicas: {{ .Values.loki.resultsCache.replicas }}
          allocatedMemory: 64
        chunksCache:
          replicas: {{ .Values.loki.chunksCache.replicas }}
          allocatedMemory: 1024
        rollout_operator:
          enabled: true
          image:
            registry: {{ .Values.registry }}
          podSecurityContext:
            fsGroup: 10001
            runAsGroup: 10001
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile:
              type: RuntimeDefault
            supplementalGroups:
              - 100
          serviceMonitor:
            enabled: true
            labels:
              release: prometheus
        sidecar:
          image:
            registry: {{ .Values.registry }}
        monitoring:
          serviceMonitor:
            enabled: true
            labels:
              release: prometheus
            relabelings:
              - action: replace
                replacement: loki/$1
                regex: loki/loki-(.*)
                sourceLabels:
                  - job
                targetLabel: job
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.loki.namespace }}
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: querier
  namespace: {{ .Values.loki.namespace }}
  labels:
    release: prometheus
spec:
  groups:
    - name: Querier
      rules:
        - alert: LokiAutoscalerMaxedOut
          expr: kube_horizontalpodautoscaler_status_current_replicas{namespace=~"{{ .Values.loki.namespace }}"} == kube_horizontalpodautoscaler_spec_max_replicas{namespace=~"{{ .Values.loki.namespace }}"}
          for: 3h
          labels:
            severity: warning
          annotations:
            description: HPA {{"{{ $labels.namespace }}"}}/{{"{{ $labels.horizontalpodautoscaler }}"}} has been running at max replicas for longer than 3h; this can indicate underprovisioning.
            summary: HPA has been running at max replicas for an extended time
{{- if .Values.loki.autoscaling.vertical.enabled }}
{{- range ( list "distributor" "querier" "query-frontend" "query-scheduler" "rollout-operator" ) }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ print $.Values.loki.name "-" . }}
  namespace: {{ $.Values.loki.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: {{ print $.Values.loki.name "-" . }}
  updatePolicy:
    updateMode: {{ $.Values.loki.autoscaling.vertical.updateMode | quote }}
{{- end }}
{{- range ( list "compactor" "index-gateway" "ingester-zone-a" "ingester-zone-b" "ingester-zone-c" "ruler" ) }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ print $.Values.loki.name "-" . }}
  namespace: {{ $.Values.loki.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: StatefulSet
    name: {{ print $.Values.loki.name "-" . }}
  updatePolicy:
    updateMode: {{ $.Values.loki.autoscaling.vertical.updateMode | quote }}
{{- end }}
# we don't autoscale memcached memory, it will use what is available. We can however autoscale the memcached-exporter that is used to export metrics to prometheus
{{- range ( list "chunks-cache" "results-cache" ) }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ print $.Values.loki.name "-" . }}
  namespace: {{ $.Values.loki.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: StatefulSet
    name: {{ print $.Values.loki.name "-" . }}
  updatePolicy:
    updateMode: {{ $.Values.loki.autoscaling.vertical.updateMode | quote }}
  resourcePolicy:
    containerPolicies:
      - containerName: "memcached"
        controlledResources:
          - "cpu"
      - containerName: "exporter"
        controlledResources:
          - "cpu"
          - "memory"
{{- end }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ print .Values.loki.name "-canary" }}
  namespace: {{ .Values.loki.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: DaemonSet
    name: {{ print .Values.loki.name "-canary" }}
  updatePolicy:
    updateMode: {{ $.Values.loki.autoscaling.vertical.updateMode | quote }}
{{- end }}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ print .Values.loki.name "-querier" }}
  namespace: {{ .Values.loki.namespace }}
spec:
  maxReplicaCount: 30
  minReplicaCount: 2
  scaleTargetRef:
    kind: Deployment
    name: {{ print .Values.loki.name "-querier" }}
  triggers:
  - metadata:
      metricName: querier_autoscaling_metric
      query: sum(max_over_time(loki_query_scheduler_inflight_requests{namespace="{{ .Values.loki.namespace }}", quantile="0.75"}[2m]))
      serverAddress: {{ .Values.prometheusAddress }}
      threshold: "4"
    type: prometheus
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 1800

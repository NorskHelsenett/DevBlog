{{- if ( and .Values.grafanaProvisioner.enabled .Values.tenants ) }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.grafanaProvisioner.name }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.argocdProject }}
  source:
    repoURL: container-registry-proxy.example.com/example-repo
    targetRevision: 0.0.89
    chart: grafana-provisioner
    helm:
      valuesObject:
        environment: {{ .Values.grafanaProvisioner.environment }}
        grafanaUrl: {{ print ( .Values.grafanaHa.name ) "." ( .Values.grafanaHa.namespace ) ":80" }}
        opentelemetryCollectorEndpoint: "http://otlp-collector.opentelemetry:4318"
        datasources:
          alertmanager:
            url: {{ print "http://" .Values.mimirIngest.name "-gateway." .Values.mimirIngest.namespace ":80" }}
          loki:
            {{- if .Values.loki.useGateway }}
            url: {{ print "http://" .Values.loki.name "-gateway." .Values.loki.namespace ":80" }}
            {{- else }}
            url: {{ print "http://" .Values.loki.name "-query-frontend." .Values.loki.namespace ":3100" }}
            {{- end }}
          prometheus:
            url: {{ print "http://" .Values.mimirIngest.name "-gateway." .Values.mimirIngest.namespace ":80/prometheus" }}
          tempo:
            {{- if .Values.tempo.useGateway }}
            url: {{ print "http://" .Values.tempo.name "-gateway." .Values.tempo.namespace ":80" }}
            {{- else }}
            url: {{ print "http://" .Values.tempo.name "-query-frontend." .Values.tempo.namespace ":3200" }}
            {{- end }}
            streamingEnabled: true
        {{- if .Values.tenants }}
        organizations:
        {{- range .Values.tenants }}
        {{- $_ := required "Team is required in tenant" .team }}
        {{- if not ( regexMatch "^team-[a-z-]+$" .team ) }}
        {{- fail "invalid value for team, must be prefixed with 'team-' and can only contain lowercase letters eg 'team-abc'" }}
        {{- end }}
          - name: {{ .team }}
        {{- end }}
        {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.grafanaProvisioner.namespace }}
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      {{- /* We need to apply server side because the dashboard resources that are stored in configmaps are too large */}}
      - ServerSideApply=true
{{- end }}

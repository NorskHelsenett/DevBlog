apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-strimzi-kafka-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.argocdProject }}
  destination:
    name: "in-cluster"
    namespace: {{ .Values.kafka.namespace }}
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
  source:
    chart: strimzi-kafka-operator
    repoURL: container-registry.example.com/quayio/strimzi-helm # hard code here to help renovate bot
    targetRevision: 0.48.0
    helm:
      valuesObject:
        revisionHistoryLimit: 3
        defaultImageRegistry: {{ .Values.kafka.strimzi.defaultImageRegistry }}
        podSecurityContext:
          # seccompProfile:
          #   type: RuntimeDefault
          supplementalGroups:
            - 100
        securityContext:
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
          privileged: false
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          runAsGroup: 1001
          readOnlyRootFilesystem: true

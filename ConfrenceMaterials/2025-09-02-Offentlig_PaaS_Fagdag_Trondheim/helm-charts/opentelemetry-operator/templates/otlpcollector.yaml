{{- if .Values.otlpCollector.enabled }}
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otlp
spec:
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            topologyKey: kubernetes.io/hostname
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - otlp-collector
          weight: 100
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: ${env:MY_POD_IP}:4317
          http:
            endpoint: ${env:MY_POD_IP}:4318
    processors:
      {{- with .Values.otlpCollector.additionalLabels }}
      attributes:
        actions:
          {{- range $key, $value := . }}
          - key: {{ $key }}
            value: {{ $value }}
            action: insert
          {{- end }}
      {{- end }}
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
    exporters:
      kafka:
        auth:
          tls:
            ca_file: /kafka/tls/BrokerCaCertificate.pem
            cert_file: /kafka/tls/UserCertificate.pem
            key_file: /kafka/tls/UserKey.pem
        brokers:
          - {{ .Values.kafka.bootstrapServer | quote }}
        logs:
          topic: {{ .Values.kafka.topics.logs | quote }}
        metrics:
          topic: {{ .Values.kafka.topics.metrics | quote }}
        producer:
          {{- with .Values.kafka.compression }}
          compression: {{ .type }}
          compression_params:
            level: {{ .params.level }}
          {{- end }}
          required_acks: 0
        protocol_version: 2.1.0
        sending_queue:
          batch:
            {{- /*
            This sets the max size of the batches exported to kafka. We set it to 800 KiB.
            Setting this to 1MiB causes the messages to be too large for some reason.
            */}}
            max_size: 819200
            sizer: bytes
        traces:
          topic: {{ .Values.kafka.topics.traces | quote }}
      {{- if .Values.otlpCollector.exporters.prometheusOtlp.enabled }}
      otlphttp/prometheus:
        endpoint: {{ .Values.otlpCollector.exporters.prometheusOtlp.endpoint }}
      {{- end }}
    extensions:
      health_check:
        endpoint: ${env:MY_POD_IP}:13133
    service:
      extensions:
        - health_check
      pipelines:
        logs:
          receivers:
            - otlp
          processors:
            - memory_limiter
            {{- if .Values.otlpCollector.additionalLabels }}
            - attributes
            {{- end }}
          exporters:
            - kafka
        metrics:
          receivers:
            - otlp
          processors:
            - memory_limiter
            {{- if .Values.otlpCollector.additionalLabels }}
            - attributes
            {{- end }}
          exporters:
            - kafka
            {{- if .Values.otlpCollector.exporters.prometheusOtlp.enabled }}
            - otlphttp/prometheus
            {{- end }}
        traces:
          receivers:
            - otlp
          processors:
            - memory_limiter
            {{- if .Values.otlpCollector.additionalLabels }}
            - attributes
            {{- end }}
          exporters:
            - kafka
      telemetry:
        logs:
          encoding: json
          level: {{ .Values.otlpCollector.telemetry.logs.level }}
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: ${env:MY_POD_IP}
                    port: 8888
                    without_type_suffix: true
  env:
    - name: MY_POD_IP
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: status.podIP
  mode: deployment
  observability:
    metrics:
      enableMetrics: true
      extraLabels:
        release: prometheus
  podDisruptionBudget:
    maxUnavailable: 1
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
    supplementalGroups:
      - 100
  replicas: {{ .Values.otlpCollector.replicas }}
  resources:
    {{- toYaml .Values.otlpCollector.resources | nindent 4 }}
  securityContext:
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsGroup: 10001
  volumes:
    - name: kafka
      secret:
        secretName: {{ .Values.kafka.secretName }}
  volumeMounts:
    - name: kafka
      readOnly: true
      mountPath: /kafka/tls
{{- end }}

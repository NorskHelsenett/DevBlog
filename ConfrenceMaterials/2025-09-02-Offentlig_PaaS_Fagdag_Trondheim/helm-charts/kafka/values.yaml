kafka:
  cluster:
    brokers:
      storage:
        size: 50Gi
      resources:
        requests:
          memory: 2Gi
          cpu: 0.1
        limits:
          memory: 4Gi
      config:
        defaultTopicRetentionBytes: 20_000_000_000
        defaultTopicRetentionHours: 1
        compression:
          type: producer
